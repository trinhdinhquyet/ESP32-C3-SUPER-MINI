# ============================================
# ESP32 Heart Rate API Server Configuration
# ============================================

# Application Info
spring.application.name=ESP32 Heart Rate API Server
server.port=8089

# Database Configuration (SQL Server)
spring.datasource.url=jdbc:sqlserver://;serverName=10.32.10.205;databaseName=esp32;encrypt=true;trustServerCertificate=true
spring.datasource.username=oee_db
spring.datasource.password=${DB_PASSWORD:Wlv@1234}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.default_schema=dbo

# Physical Naming Strategy
spring.jpa.physical-naming-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Connection Pool (Hikari)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ============================================
# EMQX MQTT Configuration
# ============================================
mqtt.broker.url=tcp://10.32.10.205:1883
mqtt.client.id=esp32-backend-subscriber
mqtt.username=andon
mqtt.password=adminwlv
mqtt.topic=heartrate

# Logging Configuration (Clean output)
logging.level.root=INFO
logging.level.com.dwm.apiserver=INFO
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{HH:mm:ss} [%t] %-5level %logger{36} - %msg%n
logging.charset.console=UTF-8

# Server CORS / File upload configs if needed
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
